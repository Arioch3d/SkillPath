<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillPath - Skills Page</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">SkillPath</a>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="jobs.html">Jobs</a>
                <a href="resources.html">Resources</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="skills-page container">
            <h1>Professional Skill Tracker</h1>
            <p>Manage skills, track progress, and visualize your overall completion.</p>

            <div class="overall-progress">
                <div class="overall-title">Overall completion</div>
                <div class="progress-track">
                    <div id="avg-progress-bar" class="progress-bar"></div>
                </div>
                <div id="avg-progress-label">0%</div>
            </div>

            <form id="skill-form" class="skill-form">
                <input type="hidden" id="skill-id" />
                <label>
                    Skill name
                    <input id="skill-name" type="text" placeholder="e.g. JavaScript" required>
                </label>
                <label>
                    Progress (%)
                    <input id="skill-progress" type="range" min="0" max="100" value="40">
                </label>
                <div class="range-output">Current: <span id="skill-progress-label">40</span>%</div>

                <button type="submit" class="btn-primary" id="skill-submit">Add Skill</button>
            </form>

            <div id="skills-list" class="skills-list"></div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 SkillPath</p>
        </div>
    </footer>

    <script src ="./js/skills.js"></script>
</body>
</html>
